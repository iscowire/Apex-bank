<!DOCTYPE html>
<html>
<head>
    <title>Apex Bank Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🏦 Apex Bank</h1>

        <h2>Login</h2>

        <input
            type="email"
            id="loginEmail"
            placeholder="Email">

        <input
            type="password"
            id="loginPassword"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="register.html">
                Register Here
            </a>
        </p>

    </div>

    <script src="script.js"></script>
</body>
</html>
